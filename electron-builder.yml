appId: com.davidkearney.postorama
productName: Postorama
copyright: "Copyright © 2026 Dave Kearney"

directories:
  output: out
  buildResources: assets

files:
  - dist/**/*
  - node_modules/**/*
  - "!node_modules/.cache"

asarUnpack:
  - "node_modules/better-sqlite3/**"
  - "node_modules/sharp/**"

mac:
  category: public.app-category.utilities
  target:
    - target: dmg
      arch: [x64, arm64]
  entitlementsInherit: entitlements.mac.inherit.plist
  entitlements: entitlements.mac.plist
  icon: assets/icon.png

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

extraResources:
  - from: assets/
    to: assets/
    filter:
      - "*.png"
  - from: resources/
    to: resources/
  - from: scripts/
    to: scripts/
    filter:
      - "**/*.swift"
